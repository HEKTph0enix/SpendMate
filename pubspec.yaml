name: spendmate
description: SpendMate - Offline-first personal expense tracker and group expense splitter for Indian users.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  provider: ^6.1.1
  fl_chart: ^0.66.0
  intl: ^0.19.0
  csv: ^6.0.0
  share_plus: 10.1.4
  uuid: ^4.2.1
  shared_preferences: ^2.2.2
  path: ^1.8.3
  flutter_secure_storage: ^9.0.0
  permission_handler: ^11.0.0
  file_picker: 10.3.10
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  build_runner: ^2.4.7
  sqflite_common_ffi: ^2.3.6

flutter:
  uses-material-design: true
